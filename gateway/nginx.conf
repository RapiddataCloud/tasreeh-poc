events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream krakend_upstream { server krakend:8080; }
  upstream ws_upstream { server notification-service:8084; }
  upstream ui_upstream { server tasreeh-po-approval-ui:80; }

  server {
    listen 80;

    location / {
      proxy_pass http://ui_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FIX: preserve /api prefix
    location /api/ {
      proxy_pass http://krakend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      proxy_pass http://ws_upstream/ws;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600;
      proxy_send_timeout 3600;
    }
  }
}
