<div class="create-order">
  <!-- Page Header -->
  <div class="page-header">
    <a routerLink="/employee/dashboard" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      Back to Dashboard
    </a>
    <h1>Create Purchase Request</h1>
    <p class="page-description">Submit a new purchase order for approval</p>
  </div>

  <!-- Form Card -->
  <div class="card">
    <!-- Error Message -->
    <div *ngIf="errorMsg" class="alert alert-error">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
        <path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      {{ errorMsg }}
    </div>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label" for="item">Item Name</label>
        <input id="item" [(ngModel)]="item" name="item" required class="form-input"
          placeholder="Enter item or service name" />
      </div>

      <div class="form-group">
        <label class="form-label" for="amount">Amount (AED)</label>
        <input id="amount" [(ngModel)]="amount" name="amount" type="number" required class="form-input"
          placeholder="0.00" />
        <span class="form-hint">Amounts greater than AED 1,000 require manager approval</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="description">Description</label>
        <textarea id="description" [(ngModel)]="description" name="description" rows="4"
          class="form-input form-textarea" placeholder="Provide details about this purchase request..."></textarea>
      </div>

      <div class="form-actions">
        <a routerLink="/employee/dashboard" class="btn btn-secondary">Cancel</a>
        <button type="submit" [disabled]="submitting" class="btn btn-primary">
          <span *ngIf="!submitting">Submit Request</span>
          <span *ngIf="submitting" class="btn-loading">
            <span class="spinner-sm"></span>
            Submitting...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
