<!-- Sidebar -->
<aside class="sidebar" [class.collapsed]="sidebarCollapsed" [class.mobile-open]="mobileSidebarOpen">
    <!-- Logo -->
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-icon">
                <img src="pcfc-logo.png" alt="PCFC Logo" />
            </div>
            <div class="logo-text-block" *ngIf="!sidebarCollapsed">
                <span class="logo-text">PCFC</span>
                <span class="logo-sub">Tasreeh</span>
            </div>
        </div>
        <button class="collapse-btn desktop-only" (click)="toggleSidebar()" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path *ngIf="!sidebarCollapsed" d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" />
                <path *ngIf="sidebarCollapsed" d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </button>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <div class="nav-section" *ngIf="!sidebarCollapsed">
            <span class="nav-section-label">{{ isManager ? 'Management' : 'My Workspace' }}</span>
        </div>

        <!-- Employee Links -->
        <ng-container *ngIf="isEmployee">
            <a routerLink="/employee/dashboard" routerLinkActive="active" class="nav-item"
                (click)="mobileSidebarOpen = false">
                <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                    <path
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1m-2 0h2"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span *ngIf="!sidebarCollapsed">Dashboard</span>
            </a>
            <a routerLink="/employee/create" routerLinkActive="active" class="nav-item"
                (click)="mobileSidebarOpen = false">
                <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                    <path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span *ngIf="!sidebarCollapsed">New Request</span>
            </a>
        </ng-container>

        <!-- Manager Links -->
        <ng-container *ngIf="isManager">
            <a routerLink="/manager/dashboard" routerLinkActive="active" class="nav-item"
                (click)="mobileSidebarOpen = false">
                <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                    <path
                        d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 16a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1H5a1 1 0 01-1-1v-3zM14 13a1 1 0 011-1h4a1 1 0 011 1v6a1 1 0 01-1 1h-4a1 1 0 01-1-1v-6z"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span *ngIf="!sidebarCollapsed">Dashboard</span>
            </a>
            <a routerLink="/manager/pending" routerLinkActive="active" class="nav-item"
                (click)="mobileSidebarOpen = false">
                <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span *ngIf="!sidebarCollapsed">Pending Approvals</span>
            </a>
            <a routerLink="/manager/orders" routerLinkActive="active" class="nav-item"
                (click)="mobileSidebarOpen = false">
                <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                    <path
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span *ngIf="!sidebarCollapsed">All Orders</span>
            </a>
        </ng-container>
    </nav>

    <!-- User Section -->
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar">{{ userInitials }}</div>
            <div class="user-details" *ngIf="!sidebarCollapsed">
                <span class="user-name">{{ userName || 'User' }}</span>
                <span class="user-role">{{ userRole }}</span>
            </div>
        </div>
        <button class="logout-btn" (click)="logout()" [attr.title]="sidebarCollapsed ? 'Logout' : null">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
                <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span *ngIf="!sidebarCollapsed">Logout</span>
        </button>
    </div>
</aside>

<!-- Mobile overlay -->
<div class="sidebar-overlay" *ngIf="mobileSidebarOpen" (click)="mobileSidebarOpen = false"></div>

<!-- Main content -->
<div class="main-wrapper" [class.sidebar-collapsed]="sidebarCollapsed">
    <!-- Topbar -->
    <header class="topbar">
        <button class="mobile-menu-btn" (click)="toggleMobileSidebar()">
            <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
        </button>
        <div class="topbar-right">
            <div class="role-badge">{{ userRole }}</div>
        </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
        <router-outlet></router-outlet>
    </main>
</div>
