# =============================
# SERVER
# =============================
server.port=8082
spring.application.name=order-service

# =============================
# DATABASE (PostgreSQL)
# =============================
spring.datasource.url=jdbc:postgresql://postgres:5432/orderdb
spring.datasource.username=postgres
spring.datasource.password=Jan@2026

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =============================
# LOGGING — Only show Kafka flow
# =============================
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.com.tasreeh.po.order_service=INFO
logging.level.org.springframework.kafka=WARN

# =============================
# KAFKA
# =============================
spring.kafka.bootstrap-servers=kafka:9092

# --- Producer ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# --- Consumer (receives status-changed from workflow-service) ---
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.tasreeh.po.order_service.events.OrderStatusChangedEvent

# =============================
# OPENTELEMETRY TRACING
# =============================
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://otel-collector:4318/v1/traces
management.tracing.propagation.type=w3c
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# =============================
# GRACEFUL SHUTDOWN
# =============================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
