services:

  # -----------------------------
  # PostgreSQL 18 (Order DB)
  # -----------------------------
  order-db:
    image: postgres:18
    container_name: order-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Jan@2026"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - order_db_data:/var/lib/postgresql
    restart: unless-stopped

  # -----------------------------
  # Keycloak DB (PostgreSQL 18)
  # -----------------------------
  keycloak-db:
    image: postgres:18
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: "keycloak"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - keycloak_db_data:/var/lib/postgresql
    restart: unless-stopped

  # -----------------------------
  # Keycloak
  # -----------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: keycloak
    depends_on:
      - keycloak-db
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: ["start-dev", "--http-port=8081"]
    ports:
      - "8081:8081"
    restart: unless-stopped

  # -----------------------------
  # Zookeeper
  # -----------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    restart: unless-stopped

  # -----------------------------
  # Kafka (Host: localhost:9092, Docker network: kafka:29092)
  # -----------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    restart: unless-stopped

  # -----------------------------
  # KrakenD API Gateway
  # -----------------------------
  krakend:
    image: devopsfaith/krakend:2.7
    container_name: krakend
    ports:
      - "8080:8080"
    volumes:
      - ./gateway:/etc/krakend
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    restart: unless-stopped

  # -----------------------------
  # Jaeger (Trace UI)
  # -----------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "9411:9411"
    restart: unless-stopped

  # -----------------------------
  # OpenTelemetry Collector
  # -----------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
    restart: unless-stopped

  # -----------------------------
  # Spring Boot - Order Service
  # -----------------------------
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    depends_on:
      - order-db
      - kafka
      - keycloak
      - otel-collector
    environment:
      SERVER_PORT: "8082"
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/orderdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "Jan@2026"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_SERVICE_NAME: order-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "8082:8082"
    restart: unless-stopped

  # -----------------------------
  # Spring Boot - Workflow Service
  # -----------------------------
  workflow-service:
    build:
      context: ./services/workflow-service
      dockerfile: Dockerfile
    container_name: workflow-service
    depends_on:
      - order-db
      - kafka
      - keycloak
      - otel-collector
    environment:
      SERVER_PORT: "8083"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_SERVICE_NAME: workflow-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "8083:8083"
    restart: unless-stopped

  # -----------------------------
  # Spring Boot - Notification Service
  # -----------------------------
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      - kafka
      - keycloak
      - otel-collector
    environment:
      SERVER_PORT: "8084"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    ports:
      - "8084:8084"
    restart: unless-stopped

  # -----------------------------
  # Angular UI (Nginx served)
  # -----------------------------
  tasreeh-po-approval-ui:
    build:
      context: ./frontend/tasreeh-po-approval-ui
      dockerfile: Dockerfile
    container_name: tasreeh-po-approval-ui
    depends_on:
      - krakend
      - order-service
      - workflow-service
      - notification-service
      - keycloak
    ports:
      - "4200:80"
    restart: unless-stopped

  # -----------------------------
  # Nginx Proxy (Single Entry Point + WebSocket)
  # -----------------------------
  tasreeh-nginx:
    build:
      context: ./gateway
      dockerfile: Dockerfile.nginx
    container_name: tasreeh-nginx
    depends_on:
      - krakend
      - notification-service
      - tasreeh-po-approval-ui
    ports:
      - "8090:80"
    restart: unless-stopped

volumes:
  order_db_data:
  keycloak_db_data:
  